<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="auto">
  <defs>
    <!-- Deep obsidian space background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060b" />
      <stop offset="60%" stop-color="#0c0f1b" />
      <stop offset="100%" stop-color="#020306" />
    </linearGradient>

    <!-- Platinum/Chrome text gradient -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#e2e8f0" />
      <stop offset="50%" stop-color="#cbd5e0" />
      <stop offset="70%" stop-color="#718096" />
      <stop offset="100%" stop-color="#cbd5e0" />
    </linearGradient>

    <!-- Glassmorphic border gradient -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="70%" stop-color="#4facfe" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.25" />
    </linearGradient>

    <!-- 3D spheres shading -->
    <radialGradient id="sphere1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#00f2fe" />
      <stop offset="80%" stop-color="#1a365d" />
      <stop offset="100%" stop-color="#0a1121" />
    </radialGradient>
    <radialGradient id="sphere2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#4facfe" />
      <stop offset="85%" stop-color="#2b6cb0" />
      <stop offset="100%" stop-color="#080e1a" />
    </radialGradient>

    <!-- Realistic 3D card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.75" />
    </filter>
    
    <!-- Sphere shadows -->
    <filter id="sphereShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-8" dy="16" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <style>
      .extruded-text-base {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 60px;
        letter-spacing: 8px;
        text-anchor: middle;
      }
      .chrome-text {
        fill: url(#chromeGrad);
      }
      .subtitle {
        font-family: "SFMono-Regular", Consolas, Menlo, monospace;
        font-weight: 600;
        font-size: 13px;
        fill: #94a3b8;
        letter-spacing: 3px;
        text-anchor: middle;
      }
      .glass-panel {
        fill: #ffffff;
        fill-opacity: 0.02;
        stroke: url(#glassBorder);
        stroke-width: 1.5;
      }
      .perspective-grid {
        stroke: #ffffff;
        stroke-opacity: 0.03;
        stroke-width: 1;
      }
    </style>
  </defs>

  <!-- Deep space backdrop -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />

  <!-- 3D Perspective Grid Background -->
  <g class="perspective-grid">
    <!-- Perspective lines extending from center-top horizon -->
    <line x1="400" y1="20" x2="-200" y2="260" />
    <line x1="400" y1="20" x2="0" y2="260" />
    <line x1="400" y1="20" x2="200" y2="260" />
    <line x1="400" y1="20" x2="400" y2="260" />
    <line x1="400" y1="20" x2="600" y2="260" />
    <line x1="400" y1="20" x2="800" y2="260" />
    <line x1="400" y1="20" x2="1000" y2="260" />
    
    <!-- Horizontal lines (progressively wider spaced for 3D depth) -->
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="90" x2="800" y2="90" />
    <line x1="0" y1="140" x2="800" y2="140" />
    <line x1="0" y1="200" x2="800" y2="200" />
  </g>

  <!-- Floating 3D Spheres in background with real shadows -->
  <circle cx="80" cy="70" r="28" fill="url(#sphere1)" filter="url(#sphereShadow)" />
  <circle cx="710" cy="160" r="32" fill="url(#sphere2)" filter="url(#sphereShadow)" />
  <circle cx="730" cy="60" r="15" fill="url(#sphere1)" filter="url(#sphereShadow)" />

  <!-- Floating 3D Glassmorphism Panel (Hovering Card) -->
  <rect x="120" y="35" width="560" height="170" rx="16" class="glass-panel" filter="url(#cardShadow)" />

  <!-- Centered Extruded 3D Text -->
  <g transform="translate(400, 115)">
    <!-- 3D Extrusion Shadow Layers (Simulates physical depth) -->
    <text x="0" y="4" class="extruded-text-base" fill="#1e293b" opacity="0.9">SUDHARSAN E</text>
    <text x="0" y="3" class="extruded-text-base" fill="#334155" opacity="0.8">SUDHARSAN E</text>
    <text x="0" y="2" class="extruded-text-base" fill="#475569" opacity="0.7">SUDHARSAN E</text>
    <text x="0" y="1" class="extruded-text-base" fill="#64748b" opacity="0.6">SUDHARSAN E</text>
    
    <!-- Top Chrome/Platinum Text layer -->
    <text x="0" y="0" class="extruded-text-base chrome-text">SUDHARSAN E</text>

    <!-- Glass card divider -->
    <line x1="-150" y1="18" x2="150" y2="18" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />

    <!-- Subtitle (Centered inside panel) -->
    <text x="0" y="44" class="subtitle">JAVA FULL STACK DEVELOPER  •  WEB APPS &amp; REST APIs  •  AI INTEGRATION</text>
  </g>
</svg>