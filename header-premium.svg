<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="auto" fill="none">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&amp;display=swap');
    </style>

    <!-- Animated flowing gradient for the title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%"  stop-color="#00f2fe" />
      <stop offset="25%" stop-color="#4facfe" />
      <stop offset="50%" stop-color="#38b2ac" />
      <stop offset="75%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
      <animate attributeName="x1" values="0%;-100%" dur="6s" repeatCount="indefinite" />
      <animate attributeName="x2" values="200%;100%" dur="6s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Deep space background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#05070f" />
      <stop offset="50%" stop-color="#0a1020" />
      <stop offset="100%" stop-color="#03050b" />
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00f2fe" stop-opacity="0" />
      <stop offset="50%"  stop-color="#4facfe" stop-opacity="1" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </linearGradient>

    <!-- Soft radial glow orbs -->
    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00f2fe" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4facfe" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0" />
    </radialGradient>

    <!-- Neon glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .title {
        font-family: 'Montserrat', system-ui, sans-serif;
        font-weight: 900;
        font-size: 70px;
        letter-spacing: 8px;
        text-anchor: middle;
        fill: url(#titleGrad);
        filter: url(#glow);
      }
      .subtitle {
        font-family: "SFMono-Regular", Consolas, Menlo, monospace;
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 2px;
        text-anchor: middle;
        fill: #8b9cb3;
        opacity: 0;
        animation: fadeUp 1.4s ease-out forwards;
        animation-delay: 0.8s;
      }
      .tagline {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 3px;
        text-anchor: middle;
        fill: #00f2fe;
        opacity: 0;
        animation: fadeUp 1.4s ease-out forwards;
        animation-delay: 1.2s;
      }
      .accent {
        stroke: url(#lineGrad);
        stroke-width: 3;
        stroke-dasharray: 420;
        stroke-dashoffset: 420;
        animation: draw 1.8s ease-out forwards;
        animation-delay: 0.3s;
      }
      .wave {
        fill: none;
        stroke-width: 1.5;
        stroke-dasharray: 1400;
        stroke-dashoffset: 1400;
        animation: flow 16s linear infinite;
      }
      .twinkle { animation: twinkle 3s ease-in-out infinite; }
      .twinkle2 { animation: twinkle 4.5s ease-in-out infinite; animation-delay: 1s; }
      .float-orb { animation: floatOrb 12s ease-in-out infinite; }
      .float-orb2 { animation: floatOrb 15s ease-in-out infinite reverse; }

      @keyframes draw   { to { stroke-dashoffset: 0; } }
      @keyframes flow   { to { stroke-dashoffset: 0; } }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes twinkle { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.5); } }
      @keyframes floatOrb { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-15px); } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bgGrad)" rx="18" />

  <!-- Floating glow orbs -->
  <circle class="float-orb"  cx="180" cy="90"  r="160" fill="url(#orbCyan)" />
  <circle class="float-orb2" cx="830" cy="210" r="180" fill="url(#orbBlue)" />

  <!-- Flowing parallax waves -->
  <path class="wave" d="M -50 200 Q 200 110 450 200 T 950 200" stroke="rgba(0,242,254,0.10)" style="animation-duration:18s;" />
  <path class="wave" d="M 0 150 Q 250 240 500 150 T 1050 150" stroke="rgba(79,172,254,0.08)" style="animation-duration:13s;" />
  <path class="wave" d="M -20 170 Q 230 130 480 195 T 980 170" stroke="rgba(0,242,254,0.05)" style="animation-duration:24s;" />

  <!-- Constellation network: left -->
  <g stroke="rgba(0,242,254,0.10)" stroke-width="1">
    <line x1="90" y1="70" x2="160" y2="190" />
    <line x1="70" y1="160" x2="160" y2="190" />
    <line x1="190" y1="110" x2="90" y2="70" />
    <line x1="190" y1="110" x2="160" y2="190" />
  </g>
  <circle class="twinkle"  cx="90"  cy="70"  r="3.5" fill="#00f2fe" />
  <circle class="twinkle2" cx="160" cy="190" r="4"   fill="#4facfe" />
  <circle class="twinkle"  cx="70"  cy="160" r="2.5" fill="#00f2fe" />
  <circle class="twinkle2" cx="190" cy="110" r="3"   fill="#4facfe" />

  <!-- Constellation network: right -->
  <g stroke="rgba(0,242,254,0.10)" stroke-width="1">
    <line x1="910" y1="70" x2="840" y2="190" />
    <line x1="930" y1="160" x2="840" y2="190" />
    <line x1="810" y1="110" x2="910" y2="70" />
    <line x1="810" y1="110" x2="840" y2="190" />
  </g>
  <circle class="twinkle2" cx="910" cy="70"  r="3.5" fill="#00f2fe" />
  <circle class="twinkle"  cx="840" cy="190" r="4"   fill="#4facfe" />
  <circle class="twinkle2" cx="930" cy="160" r="2.5" fill="#00f2fe" />
  <circle class="twinkle"  cx="810" cy="110" r="3"   fill="#4facfe" />

  <!-- Centered content -->
  <g transform="translate(500,150)">
    <text x="0" y="-18" class="title">SUDHARSAN E</text>
    <line x1="-210" y1="20" x2="210" y2="20" class="accent" />
    <text x="0" y="52" class="subtitle">Java Full-Stack&#160;&#160;&#8226;&#160;&#160;Web Apps&#160;&#160;&#8226;&#160;&#160;REST APIs&#160;&#160;&#8226;&#160;&#160;AI</text>
    <text x="0" y="80" class="tagline">BUILDING WEB, APIs &amp; AI-POWERED APPS</text>
  </g>
</svg>
