<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="auto" fill="none">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&amp;display=swap');
    </style>

    <!-- ===== DAY -> NIGHT CYCLE: dur 14s, keyTimes 0;0.35;0.5;0.85;1 = day | day | night | night | day ===== -->

    <!-- Sky -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2b7fc4">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#2b7fc4;#2b7fc4;#020610;#020610;#2b7fc4" />
      </stop>
      <stop offset="45%"  stop-color="#7cc3ea">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#7cc3ea;#7cc3ea;#06192b;#06192b;#7cc3ea" />
      </stop>
      <stop offset="100%" stop-color="#cfeef7">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#cfeef7;#cfeef7;#0a2c3f;#0a2c3f;#cfeef7" />
      </stop>
    </linearGradient>

    <!-- Name finish: deep-blue in daylight, white to cyan at night (kept readable in both) -->
    <linearGradient id="name" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#06283d">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#06283d;#06283d;#ffffff;#ffffff;#06283d" />
      </stop>
      <stop offset="55%"  stop-color="#0d4a6b">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#0d4a6b;#0d4a6b;#d6f3ff;#d6f3ff;#0d4a6b" />
      </stop>
      <stop offset="100%" stop-color="#1b88b0">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#1b88b0;#1b88b0;#3fc6e8;#3fc6e8;#1b88b0" />
      </stop>
    </linearGradient>

    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0" />
      <stop offset="50%"  stop-color="#00d4ff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
    </linearGradient>

    <!-- Celestial body: warm sun by day, cool moon at night -->
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff6d8" stop-opacity="0.9">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#fff6d8;#fff6d8;#dffaff;#dffaff;#fff6d8" />
      </stop>
      <stop offset="35%"  stop-color="#ffd36a" stop-opacity="0.35">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#ffd36a;#ffd36a;#7fd6ef;#7fd6ef;#ffd36a" />
      </stop>
      <stop offset="100%" stop-color="#ffd36a" stop-opacity="0">
        <animate attributeName="stop-color" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#ffd36a;#ffd36a;#7fd6ef;#7fd6ef;#ffd36a" />
      </stop>
    </radialGradient>

    <radialGradient id="auroraA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e0c8" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#00e0c8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="auroraB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2f7bff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#2f7bff" stop-opacity="0" />
    </radialGradient>

    <filter id="blurBig" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34" />
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <style>
      .reveal { opacity: 0; animation: rise 1.5s cubic-bezier(.2,.7,.2,1) forwards; }
      .d1 { animation-delay: .3s; } .d2 { animation-delay: .6s; } .d3 { animation-delay: .9s; }
      .nameFloat { animation: float 7s ease-in-out infinite; }
      .star { animation: tw 3s ease-in-out infinite; }
      .kick { font-family: "SFMono-Regular", Consolas, monospace; font-weight: 600; font-size: 12.5px; letter-spacing: 4px; text-anchor: middle; }
      .role { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14.5px; letter-spacing: 6px; text-anchor: middle; }
      @keyframes rise  { from { opacity:0; transform: translateY(14px);} to { opacity:1; transform: translateY(0);} }
      @keyframes float { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-5px);} }
      @keyframes tw    { 0%,100% { opacity:.2;} 50% { opacity:1;} }
    </style>
  </defs>

  <!-- Sky -->
  <rect width="1000" height="400" fill="url(#sky)" rx="20" />

  <!-- Aurora (visible only at night) -->
  <g filter="url(#blurBig)">
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="0;0;1;1;0" />
    <ellipse cx="300" cy="110" rx="220" ry="120" fill="url(#auroraA)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 70 18; -30 -14; 0 0" dur="21s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="720" cy="90" rx="240" ry="130" fill="url(#auroraB)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -60 20; 40 -16; 0 0" dur="26s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <!-- Sun / Moon -->
  <circle cx="830" cy="80" r="70" fill="url(#orb)" />
  <circle cx="830" cy="80" r="17" fill="#ffdf8f">
    <animate attributeName="fill" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#ffdf8f;#ffdf8f;#eaffff;#eaffff;#ffdf8f" />
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="1;1;0.85;0.85;1" />
  </circle>

  <!-- Stars (visible only at night) -->
  <g fill="#cdeaff">
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="0;0;1;1;0" />
    <circle class="star" cx="90"  cy="55"  r="1.4" style="animation-delay:.0s"/>
    <circle class="star" cx="180" cy="110" r="1.1" style="animation-delay:.6s"/>
    <circle class="star" cx="250" cy="40"  r="1.6" style="animation-delay:1.2s"/>
    <circle class="star" cx="340" cy="95"  r="1.0" style="animation-delay:.3s"/>
    <circle class="star" cx="430" cy="50"  r="1.3" style="animation-delay:1.8s"/>
    <circle class="star" cx="560" cy="70"  r="1.1" style="animation-delay:.9s"/>
    <circle class="star" cx="640" cy="40"  r="1.5" style="animation-delay:2.2s"/>
    <circle class="star" cx="700" cy="130" r="1.0" style="animation-delay:1.5s"/>
    <circle class="star" cx="900" cy="150" r="1.2" style="animation-delay:.4s"/>
    <circle class="star" cx="950" cy="60"  r="1.4" style="animation-delay:2.6s"/>
    <circle class="star" cx="120" cy="170" r="1.0" style="animation-delay:1.1s"/>
    <circle class="star" cx="480" cy="135" r="1.1" style="animation-delay:2.0s"/>
  </g>

  <!-- ============ PARALLAX MOUNTAINS (lit by day, dark at night) ============ -->

  <!-- Back range -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1000 0" dur="34s" repeatCount="indefinite" />
    <path fill="#7fb6d2" fill-opacity="0.55"
      d="M0,280 L140,230 L300,285 L450,225 L600,280 L760,222 L900,275 L1000,280 L1140,230 L1300,285 L1450,225 L1600,280 L1760,222 L1900,275 L2000,280 L2000,400 L0,400 Z">
      <animate attributeName="fill" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#7fb6d2;#7fb6d2;#15435c;#15435c;#7fb6d2" />
    </path>
    <path fill="none" stroke="#3fd0e8" stroke-opacity="0.35" stroke-width="1.5"
      d="M0,280 L140,230 L300,285 L450,225 L600,280 L760,222 L900,275 L1000,280 L1140,230 L1300,285 L1450,225 L1600,280 L1760,222 L1900,275 L2000,280"/>
  </g>

  <!-- Mid range -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1000 0" dur="23s" repeatCount="indefinite" />
    <path fill="#4f93b4" fill-opacity="0.85"
      d="M0,320 L120,255 L260,322 L390,258 L530,320 L680,250 L830,315 L1000,320 L1120,255 L1260,322 L1390,258 L1530,320 L1680,250 L1830,315 L2000,320 L2000,400 L0,400 Z">
      <animate attributeName="fill" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#4f93b4;#4f93b4;#0d2c40;#0d2c40;#4f93b4" />
    </path>
    <path fill="none" stroke="#2f9fd0" stroke-opacity="0.30" stroke-width="1.5"
      d="M0,320 L120,255 L260,322 L390,258 L530,320 L680,250 L830,315 L1000,320 L1120,255 L1260,322 L1390,258 L1530,320 L1680,250 L1830,315 L2000,320"/>
  </g>

  <!-- Front range -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1000 0" dur="15s" repeatCount="indefinite" />
    <path fill="#2c6885"
      d="M0,365 L110,315 L230,368 L350,320 L490,365 L630,318 L780,360 L920,322 L1000,365 L1110,315 L1230,368 L1350,320 L1490,365 L1630,318 L1780,360 L1920,322 L2000,365 L2000,400 L0,400 Z">
      <animate attributeName="fill" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#2c6885;#2c6885;#07161f;#07161f;#2c6885" />
    </path>
    <path fill="none" stroke="#1f7ba0" stroke-opacity="0.30" stroke-width="1.5"
      d="M0,365 L110,315 L230,368 L350,320 L490,365 L630,318 L780,360 L920,322 L1000,365 L1110,315 L1230,368 L1350,320 L1490,365 L1630,318 L1780,360 L1920,322 L2000,365"/>
  </g>

  <!-- Ground mist -->
  <rect x="0" y="330" width="1000" height="70" fill="#0a2c3f" opacity="0.35" />

  <!-- ============ TITLE BLOCK ============ -->
  <g class="nameFloat">
    <g class="reveal d1">
      <line x1="430" y1="104" x2="570" y2="104" stroke="url(#rule)" stroke-width="1.5" />
      <text x="500" y="96" class="kick" fill="#0f5d80">
        <animate attributeName="fill" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#0f5d80;#0f5d80;#4fd6e8;#4fd6e8;#0f5d80" />PORTFOLIO&#160;//&#160;2026</text>
    </g>
    <g class="reveal d2" filter="url(#glow)">
      <text x="500" y="178" text-anchor="middle" font-family="Montserrat, sans-serif"
            font-weight="900" font-size="76" letter-spacing="9" fill="url(#name)">SUDHARSAN E</text>
    </g>
    <line class="reveal d2" x1="360" y1="204" x2="640" y2="204" stroke="url(#rule)" stroke-width="2" />
    <text class="reveal d3 role" x="500" y="232" fill="#234a63">
      <animate attributeName="fill" dur="14s" repeatCount="indefinite" keyTimes="0;0.35;0.5;0.85;1" values="#234a63;#234a63;#aebfd4;#aebfd4;#234a63" />FULL-STACK&#160;&#160;&#183;&#160;&#160;WEB APPS&#160;&#160;&#183;&#160;&#160;REST APIs&#160;&#160;&#183;&#160;&#160;MOBILE</text>
  </g>
</svg>
