<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="auto">
  <defs>
    <!-- Glowing neon gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="40%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#2b6cb0" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050811" />
      <stop offset="40%" stop-color="#0b1121" />
      <stop offset="100%" stop-color="#020409" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#4facfe" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#2b6cb0" stop-opacity="0.8" />
    </linearGradient>
    
    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <style>
      .main-title {
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 58px;
        fill: url(#primaryGrad);
        letter-spacing: 7px;
        text-anchor: middle;
        filter: url(#neonGlow);
      }
      .subtitle {
        font-family: "SFMono-Regular", Consolas, Menlo, monospace;
        font-weight: 600;
        font-size: 15px;
        fill: #a0aec0;
        letter-spacing: 2.5px;
        text-anchor: middle;
      }
      .grid-lines {
        stroke: #4facfe;
        stroke-opacity: 0.04;
        stroke-width: 1;
      }
      .cyber-lines {
        stroke: #00f2fe;
        stroke-opacity: 0.15;
        stroke-width: 1.5;
        stroke-dasharray: 4, 12;
      }
      .accent-box {
        fill: none;
        stroke: url(#borderGrad);
        stroke-width: 1.5;
      }
      .tech-dots {
        fill: #00f2fe;
        fill-opacity: 0.4;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />
  
  <!-- High tech grid pattern -->
  <g class="grid-lines">
    <!-- Horizontal lines -->
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <!-- Vertical lines -->
    <line x1="80" y1="0" x2="80" y2="240" />
    <line x1="160" y1="0" x2="160" y2="240" />
    <line x1="240" y1="0" x2="240" y2="240" />
    <line x1="320" y1="0" x2="320" y2="240" />
    <line x1="400" y1="0" x2="400" y2="240" />
    <line x1="480" y1="0" x2="480" y2="240" />
    <line x1="560" y1="0" x2="560" y2="240" />
    <line x1="640" y1="0" x2="640" y2="240" />
    <line x1="720" y1="0" x2="720" y2="240" />
  </g>

  <!-- Abstract organic wave structures -->
  <path d="M-100,100 C150,220 300,50 450,150 C600,250 700,80 900,150" fill="none" stroke="url(#primaryGrad)" stroke-opacity="0.08" stroke-width="6" />
  <path d="M-50,60 C200,180 350,20 500,130 C650,240 750,40 850,100" fill="none" stroke="url(#primaryGrad)" stroke-opacity="0.05" stroke-width="4" />

  <!-- Cyberpunk border accents -->
  <rect x="25" y="20" width="750" height="200" rx="8" class="accent-box" />
  <line x1="15" y1="40" x2="15" y2="200" class="cyber-lines" />
  <line x1="785" y1="40" x2="785" y2="200" class="cyber-lines" />
  
  <!-- Tech crosshairs/reticles -->
  <path d="M 30,35 L 30,25 L 40,25" fill="none" stroke="#00f2fe" stroke-width="2.5" />
  <path d="M 770,35 L 770,25 L 760,25" fill="none" stroke="#00f2fe" stroke-width="2.5" />
  <path d="M 30,205 L 30,215 L 40,215" fill="none" stroke="#00f2fe" stroke-width="2.5" />
  <path d="M 770,205 L 770,215 L 760,215" fill="none" stroke="#00f2fe" stroke-width="2.5" />

  <!-- Corner nodes -->
  <circle cx="25" cy="20" r="3" class="tech-dots" />
  <circle cx="775" cy="20" r="3" class="tech-dots" />
  <circle cx="25" cy="220" r="3" class="tech-dots" />
  <circle cx="775" cy="220" r="3" class="tech-dots" />

  <!-- Decorative network nodes inside grid -->
  <g class="tech-dots" opacity="0.3">
    <circle cx="160" cy="80" r="2.5" />
    <circle cx="240" cy="160" r="2" />
    <circle cx="560" cy="160" r="2.5" />
    <circle cx="640" cy="80" r="2" />
    <line x1="160" y1="80" x2="240" y2="160" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.3" />
    <line x1="640" y1="80" x2="560" y2="160" stroke="#00f2fe" stroke-width="0.5" stroke-opacity="0.3" />
  </g>

  <!-- Centered Header Titles -->
  <g transform="translate(400, 115)">
    <!-- Glowing Premium Name Title -->
    <text x="0" y="-8" class="main-title">SUDHARSAN E</text>
    
    <!-- Thin glowing line under title -->
    <line x1="-120" y1="12" x2="120" y2="12" stroke="url(#primaryGrad)" stroke-width="2" filter="url(#neonGlow)" />
    
    <!-- Clean, Emojiless Subtitle -->
    <text x="0" y="44" class="subtitle">JAVA FULL STACK DEVELOPER  •  WEB APPS &amp; REST APIs  •  AI INTEGRATION</text>
  </g>
</svg>