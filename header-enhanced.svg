<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="auto">
  <defs>
    <!-- Import Montserrat Google font -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&amp;display=swap');
    </style>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#38b2ac" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060913" />
      <stop offset="50%" stop-color="#0b101e" />
      <stop offset="100%" stop-color="#030509" />
    </linearGradient>
    
    <!-- Neon Drop Shadow Glow for Title -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .title {
        font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-size: 54px;
        fill: url(#textGrad);
        letter-spacing: 6px;
        text-anchor: middle;
        filter: url(#neonGlow);
      }
      
      .subtitle {
        font-family: "SFMono-Regular", Consolas, Menlo, monospace;
        font-weight: 600;
        font-size: 15px;
        fill: #9ca3af;
        text-anchor: middle;
        opacity: 0;
        animation: fadeIn 2s ease-in-out forwards;
        animation-delay: 0.6s;
        letter-spacing: 1.5px;
      }
      
      .line {
        stroke: url(#textGrad);
        stroke-width: 2.5;
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: drawLine 2.5s ease-out forwards;
        animation-delay: 0.2s;
      }

      /* Animated grid/nodes */
      .node {
        fill: #00f2fe;
        opacity: 0.25;
        animation: pulse 4s ease-in-out infinite;
      }

      .node-delayed {
        fill: #4facfe;
        opacity: 0.2;
        animation: pulse-delayed 5s ease-in-out infinite;
        animation-delay: 1.5s;
      }

      .wave-path {
        fill: none;
        stroke: rgba(0, 242, 254, 0.07);
        stroke-width: 1.5;
        stroke-dasharray: 1200;
        stroke-dashoffset: 1200;
        animation: drawWave 14s linear infinite;
      }

      @keyframes drawLine {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.25; }
        50% { transform: scale(1.4); opacity: 0.7; }
      }

      @keyframes pulse-delayed {
        0%, 100% { transform: scale(1); opacity: 0.2; }
        50% { transform: scale(1.6); opacity: 0.6; }
      }

      @keyframes drawWave {
        0% { stroke-dashoffset: 1200; }
        100% { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="14" />

  <!-- Layered Animated Parallax Waves (Enhanced to 3 Wave Layers) -->
  <path class="wave-path" d="M -50 160 Q 150 70 350 160 T 750 160" style="animation-duration: 18s;" />
  <path class="wave-path" d="M 0 110 Q 200 190 400 110 T 800 110" style="animation-duration: 13s;" />
  <path class="wave-path" d="M -20 130 Q 180 100 380 150 T 780 130" style="animation-duration: 22s; stroke: rgba(79, 172, 254, 0.05);" />

  <!-- Constellation Nodes (Enriched network grid nodes) -->
  <!-- Left group -->
  <circle class="node" cx="80" cy="60" r="4" />
  <circle class="node-delayed" cx="130" cy="160" r="4.5" />
  <circle class="node" cx="60" cy="130" r="3" />
  <circle class="node-delayed" cx="160" cy="90" r="3.5" />
  <line x1="80" y1="60" x2="130" y2="160" stroke="rgba(0, 242, 254, 0.09)" stroke-width="1" />
  <line x1="60" y1="130" x2="130" y2="160" stroke="rgba(79, 172, 254, 0.09)" stroke-width="1" />
  <line x1="160" y1="90" x2="80" y2="60" stroke="rgba(0, 242, 254, 0.09)" stroke-width="1" />
  <line x1="160" y1="90" x2="130" y2="160" stroke="rgba(79, 172, 254, 0.09)" stroke-width="1" />

  <!-- Right group -->
  <circle class="node" cx="720" cy="60" r="4" />
  <circle class="node-delayed" cx="670" cy="160" r="4.5" />
  <circle class="node" cx="740" cy="130" r="3" />
  <circle class="node-delayed" cx="640" cy="90" r="3.5" />
  <line x1="720" y1="60" x2="670" y2="160" stroke="rgba(0, 242, 254, 0.09)" stroke-width="1" />
  <line x1="740" y1="130" x2="670" y2="160" stroke="rgba(79, 172, 254, 0.09)" stroke-width="1" />
  <line x1="640" y1="90" x2="720" y2="60" stroke="rgba(0, 242, 254, 0.09)" stroke-width="1" />
  <line x1="640" y1="90" x2="670" y2="160" stroke="rgba(79, 172, 254, 0.09)" stroke-width="1" />

  <!-- Centered Content -->
  <g transform="translate(400, 120)">
    <!-- Main Title (Montserrat high-end typography with neon drop shadow) -->
    <text x="0" y="-12" class="title">SUDHARSAN E</text>
    
    <!-- Accent Line (Animates from center) -->
    <line x1="-190" y1="12" x2="190" y2="12" class="line" />
    
    <!-- Subtitle (Centered, clean font) -->
    <text x="0" y="44" class="subtitle">Java Full Stack Developer  •  Web Apps &amp; REST APIs  •  AI Integration</text>
  </g>
</svg>